<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Runner Admin</title>
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        h1 { text-align: center; margin-bottom: 30px; }

        /* Login Section */
        #login-section {
            max-width: 400px;
            margin: 100px auto;
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 12px;
        }

        #login-section h2 { margin-top: 0; text-align: center; }

        /* Admin Section */
        #admin-section { display: none; }
        #admin-section.visible { display: block; }

        /* Form Elements */
        label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.8);
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 1rem;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #4a9eff;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:hover:not(:disabled) { transform: translateY(-2px); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }

        .btn-primary {
            background: linear-gradient(135deg, #4a9eff 0%, #6c63ff 100%);
            color: #fff;
            width: 100%;
        }

        .btn-success {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: #fff;
        }

        .btn-danger {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            color: #fff;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 2px solid rgba(255,255,255,0.2);
        }

        /* Controls Bar */
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .controls .field { flex: 1; min-width: 200px; }
        .controls .field label { margin-bottom: 5px; }
        .controls .field input { margin-bottom: 0; }
        .controls .buttons { display: flex; gap: 10px; flex-wrap: wrap; }

        /* Stats */
        .stats { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }

        .stat-box {
            background: rgba(255,255,255,0.1);
            padding: 15px 25px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-box .number { font-size: 2rem; font-weight: bold; color: #4a9eff; }
        .stat-box .label { font-size: 0.9rem; color: rgba(255,255,255,0.6); }
        .stat-box .btn-refresh {
            margin-top: 8px;
            padding: 4px 12px;
            font-size: 1rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .stat-box .btn-refresh:hover { background: rgba(255,255,255,0.2); }
        .stat-box .btn-refresh:disabled { opacity: 0.5; cursor: not-allowed; }
        .stat-box .click-error {
            font-size: 0.75rem;
            color: #ff6b6b;
            margin-top: 5px;
            min-height: 1em;
        }

        /* Table */
        .table-container {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        th {
            background: rgba(0,0,0,0.3);
            font-weight: 600;
            color: rgba(255,255,255,0.8);
        }

        tr:hover { background: rgba(255,255,255,0.05); }
        .rank { color: #ffc107; font-weight: bold; }
        .score { color: #4a9eff; font-weight: bold; }
        .email { color: rgba(255,255,255,0.6); font-size: 0.9rem; }

        /* Messages */
        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .message.visible { display: block; }
        .message.error { background: rgba(220, 53, 69, 0.2); color: #ff6b6b; }
        .message.success { background: rgba(40, 167, 69, 0.2); color: #28a745; }

        .loading, .empty {
            text-align: center;
            padding: 40px;
            color: rgba(255,255,255,0.6);
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header h1 { margin: 0; }

        /* Reset Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.visible { display: flex; }

        .modal {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 12px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .modal h3 { color: #dc3545; margin-top: 0; }
        .modal p { color: rgba(255,255,255,0.8); }
        .modal input { margin-top: 10px; }
        .modal .buttons { display: flex; gap: 10px; margin-top: 20px; }
        .modal .buttons button { flex: 1; }

        /* Responsive */
        @media (max-width: 600px) {
            .controls { flex-direction: column; }
            .controls .field { width: 100%; }
            .controls .buttons { width: 100%; }
            .controls .buttons button { flex: 1; }
            .stats { flex-direction: column; }
            table { font-size: 0.85rem; }
            th, td { padding: 8px 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Section -->
        <div id="login-section">
            <h2>Admin Login</h2>
            <div id="login-message" class="message"></div>
            <form id="login-form">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter admin password" required>
                <button type="submit" class="btn-primary" id="login-btn">Login</button>
            </form>
            <p style="text-align: center; margin-top: 20px;">
                <a href="/" style="color: rgba(255,255,255,0.6);">Back to Game</a>
            </p>
        </div>

        <!-- Admin Section -->
        <div id="admin-section">
            <div class="header">
                <h1>API Runner Admin</h1>
                <button class="btn-secondary" id="logout-btn">Logout</button>
            </div>

            <div id="admin-message" class="message"></div>

            <div class="controls">
                <div class="field">
                    <label for="event-id">Event</label>
                    <select id="event-id">
                        <option value="">Loading events...</option>
                    </select>
                </div>
                <div class="buttons">
                    <button class="btn-primary" id="load-btn">Load Scores</button>
                    <button class="btn-success" id="export-btn" disabled>Export CSV</button>
                    <button class="btn-danger" id="reset-btn" disabled>Reset Leaderboard</button>
                </div>
            </div>

            <div class="stats">
                <div class="stat-box">
                    <div class="number" id="total-count">0</div>
                    <div class="label">Total Rows</div>
                </div>
                <div class="stat-box">
                    <div class="number" id="top-score">0</div>
                    <div class="label">Top Score</div>
                </div>
                <div class="stat-box">
                    <div class="number" id="adsp-click-count">-</div>
                    <div class="label">ADSP Link Clicks</div>
                    <button class="btn-refresh" id="refresh-clicks-btn" title="Refresh click count">↻</button>
                    <div class="click-error" id="click-error"></div>
                </div>
            </div>

            <div class="table-container">
                <div id="table-content">
                    <div class="empty">Enter an Event ID and click "Load Scores" to view the leaderboard.</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Reset Confirmation Modal -->
    <div class="modal-overlay" id="reset-modal">
        <div class="modal">
            <h3>Confirm Reset</h3>
            <p>This will permanently delete ALL scores for this event.</p>
            <p>Type the Event ID to confirm:</p>
            <input type="text" id="confirm-event-id" placeholder="Type event ID here">
            <div class="buttons">
                <button class="btn-secondary" id="cancel-reset-btn">Cancel</button>
                <button class="btn-danger" id="confirm-reset-btn">Delete All</button>
            </div>
        </div>
    </div>

    <script type="module" src="/src/admin/main.js"></script>
</body>
</html>
